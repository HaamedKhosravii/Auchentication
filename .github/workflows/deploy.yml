name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
          echo "DEBUG=${{ secrets.DEBUG }}" >> .env
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env
          echo "REDIS_URL=${{ secrets.REDIS_URL }}" >> .env
          echo "CACHES_REDIS_HOST=${{ secrets.CACHES_REDIS_HOST }}" >> .env

      - name: Build and run tests
        run: |
          docker compose build web
          docker compose run --rm web python manage.py test

      - name: Tear down
        if: always()
        run: docker compose down -v

  deploy:
    name: Build, Transfer, and Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Images using Docker Compose
        run: |
          docker compose build

      - name: Save and Compress Images
        run: |
          # IMAGES=$(docker compose config | grep 'image:' | awk '{print $2}' | sort | uniq)
          echo "Saving images: $IMAGES"
          docker image ls
          # docker save $IMAGES | gzip > images.tar.gz
          # docker save auchentication-web:latest auchentication-nginx:latest redis:7.0.2-alpine | gzip > images.tar.gz
          docker save -o images.tar auchentication-web:latest auchentication-nginx:latest

      - name: Create .env file
        run: |
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
          echo "DEBUG=${{ secrets.DEBUG }}" >> .env
          echo "CACHES_REDIS_HOST=${{ secrets.CACHES_REDIS_HOST }}" >> .env

      - name: Compress Files
        run: |
          tar czvf pipeline.tar.gz images.tar docker-compose.prod.yaml .env
      
      - name: Copy Files to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "pipeline.tar.gz"
          target: "/home/git"

      - name: Load Images and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /home/git
            tar xzvf pipeline.tar.gz
            docker load < images.tar
            mv docker-compose.prod.yml docker-compose.yml
            docker compose up -d
            rm images.tar.gz
            docker image prune -f
